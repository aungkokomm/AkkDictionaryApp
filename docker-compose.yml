# Docker Compose for Local Multi-Platform Builds
version: '3.8'

services:
  android-builder:
    build:
      context: .
      dockerfile: Dockerfile.Android
    image: akk-dictionary-android-builder:latest
    volumes:
      - .:/app
      - android-sdk-cache:/android-sdk
    environment:
      - DOTNET_SKIP_FIRST_TIME_EXPERIENCE=true
      - DOTNET_CLI_TELEMETRY_OPTOUT=true
      - ANDROID_SDK_ROOT=/android-sdk
    working_dir: /app
    command: >
      bash -c "
        echo 'Installing MAUI Android workload...' &&
        dotnet workload install maui-android &&
        echo 'Building Android APK...' &&
        dotnet publish -f net8.0-android -c Release -o ./bin/releases
      "

  windows-builder:
    image: mcr.microsoft.com/windows/servercore:ltsc2022
    volumes:
      - .:/app
    working_dir: /app
    command: >
      powershell.exe -Command "
        dotnet build -c Release -f net8.0-windows &&
        dotnet publish -c Release -f net8.0-windows -o ./bin/releases/windows
      "

volumes:
  android-sdk-cache:
    driver: local
